name: Bug report
description: Report an install, runtime, or workflow-wrapper problem.
title: "[bug] "
labels:
  - bug
body:
  - type: dropdown
    id: layout
    attributes:
      label: BMAD layout
      options:
        - current (_bmad/bmm/4-implementation)
        - legacy (_bmad/bmm/workflows/4-implementation)
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: macOS 15 / Ubuntu 24.04
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: 3.12.8
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node version
      placeholder: 20.18.0
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Exact command
      placeholder: npx bmad-story-automator /path/to/project
    validations:
      required: true
  - type: dropdown
    id: install_mode
    attributes:
      label: Install path type
      options:
        - not applicable / unknown
        - npm package
        - manual skill copy
        - Claude plugin
        - BMAD Method --modules
        - BMAD Method --all-stable / --channel stable
        - BMAD Method --pin
        - BMAD Method --custom-source
    validations:
      required: true
  - type: input
    id: install_ref
    attributes:
      label: Installed tag, branch, or package version
      description: Use `not applicable` if this is not an install or rollback issue.
      placeholder: v1.14.2 / v1.15.0-next.1 / next/codex-runtime-support / npm version / not applicable
    validations:
      required: true
  - type: dropdown
    id: target_tool
    attributes:
      label: Target tool
      options:
        - claude-code
        - codex
        - both
        - not applicable
    validations:
      required: true
  - type: textarea
    id: manifest
    attributes:
      label: YAML install manifest
      description: Paste `_bmad/_config/manifest.yaml`. Use `not applicable` if no BMAD install is involved.
      render: yaml
    validations:
      required: true
  - type: textarea
    id: install_manifest_csv
    attributes:
      label: CSV install manifest
      description: Paste `_bmad/install-manifest.csv` if it exists. Use `not applicable` if no CSV install manifest exists.
    validations:
      required: true
  - type: textarea
    id: installer_output
    attributes:
      label: Exact installer stdout/stderr
      description: Include the full output when the issue involves install, rollback, pin, or custom-source behavior. Use `not applicable` if no installer ran.
      render: shell
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior / error output
    validations:
      required: true
